// ========== DOSYA: sentinel-spec/proto/market_data.proto ==========
syntax = "proto3";

package sentinel.market.v1; // v1 eklendi

// Binance veya başka bir borsadan gelen anlık işlem (Tick) verisi
message AggTrade {
  string symbol = 1; // Örn: "BTCUSDT"
  double price = 2; // İşlem fiyatı
  double quantity = 3; // İşlem hacmi
  int64 timestamp = 4; // Borsa zaman damgası (milisaniye)
  bool is_buyer_maker = 5; // True ise satıcı piyasa yapıcıdır (Satış baskısı)
}

// Qdrant'a atacağımız 1 saniyelik özet Vektör Modeli
message MarketStateVector {
  string symbol = 1;
  int64 window_start_time = 2;
  int64 window_end_time = 3;

  // Feature'lar (0-1 arası normalize edilecek)
  double price_velocity = 4; // Fiyat değişim hızı
  double volume_imbalance = 5; // Alıcı hacmi / Satıcı hacmi
  double sentiment_score = 6; // LLM'den gelen duygu analizi (-1 ile 1 arası)

  // Bunları Qdrant'a gömeceğiz
  repeated double embeddings = 7;
}
